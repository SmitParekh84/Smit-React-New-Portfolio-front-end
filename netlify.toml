[build]
  command = "yarn install --ignore-engines && yarn build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18.20.8"
  YARN_FLAGS = "--ignore-engines"

# First ensure that ads.txt is handled directly
[[redirects]]
  from = "/ads.txt"
  to = "/ads.txt"
  status = 200

# Then handle all other paths with the catch-all redirect
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
