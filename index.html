      #app-loader {

      /* Brand logo */
      .apl-brand {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 96px;
        height: 96px;
        border-radius: 22px;
        background: #fff;
        padding: 10px;
        box-shadow: 0 8px 32px hsla(210, 93%, 32%, 0.35);
        animation: apl-pulse 2s ease-in-out infinite;
      }
      html.dark-theme-preload .apl-brand {
        background: hsl(210, 28%, 16%);
        box-shadow: 0 8px 32px hsla(210, 93%, 55%, 0.25);
      }
      .apl-brand img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      /* Name text */
      .apl-name {
        font-family: "Poppins", "Segoe UI", system-ui, sans-serif;
        font-size: 1rem;
        font-weight: 500;
        color: hsl(210, 8%, 45%);
        letter-spacing: 3px;
        text-transform: uppercase;
      }
      html.dark-theme-preload .apl-name {
        color: hsl(210, 8%, 65%);
      }

      /* Three bouncing dots */
      .apl-dots {
        display: flex;
        gap: 8px;
      }
      .apl-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: hsl(210, 93%, 32%);
        animation: apl-bounce 1.3s ease-in-out infinite;
        opacity: 0.8;
      }
      .apl-dots span:nth-child(2) {
        animation-delay: 0.18s;
      }
      .apl-dots span:nth-child(3) {
        animation-delay: 0.36s;
      }

      @keyframes apl-pulse {
        0%,
        100% {
          transform: scale(1);
          box-shadow: 0 8px 32px hsla(210, 93%, 32%, 0.35);
        }
        50% {
          transform: scale(1.06);
          box-shadow: 0 12px 40px hsla(210, 93%, 32%, 0.55);
        }
      }
      @keyframes apl-bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.4;
        }
        40% {
          transform: translateY(-10px);
          opacity: 1;
        }
      }
    </style>
