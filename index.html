      window.cookieConsent = {
        preferences: true,
        statistics: true,
        marketing: true,
      }

      // EU Cookie Consent Check - Simple Implementation
      function initCookieConsent() {
        const hasConsent = localStorage.getItem("cookieConsent")
        if (!hasConsent && navigator.cookieEnabled) {
          // We would show cookie consent banner here in a full implementation
          localStorage.setItem(
            "cookieConsent",
            JSON.stringify(window.cookieConsent)
          )
        }
      }

      // Initialize on page load
      window.addEventListener("DOMContentLoaded", initCookieConsent)
    </script>
